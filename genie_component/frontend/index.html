<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #wrap {
      position: relative;
      width: 100%;
      height: 450px;
      background: radial-gradient(circle at 50% 30%, #1c2029 0%, #0e1015 100%);
      border-radius: 12px;
      overflow: hidden;
    }

    #threeCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #status {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(33, 37, 47, 0.9);
      border: 1px solid #2c303c;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #8b8f9a;
      display: flex;
      align-items: center;
      gap: 7px;
      z-index: 10;
    }

    #dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #8b8f9a;
      transition: all .2s ease;
    }

    #status.listening #dot {
      background: #d95d5d;
      box-shadow: 0 0 6px #d95d5d;
    }

    #status.thinking #dot {
      background: #e0955d;
      box-shadow: 0 0 6px #e0955d;
    }

    #status.speaking #dot {
      background: #5da9e0;
      box-shadow: 0 0 6px #5da9e0;
    }

    #name {
      position: absolute;
      bottom: 54px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8b8f9a;
      z-index: 10;
    }

    #micBtn {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #2c303c;
      background: #21252f;
      color: #eceef2;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #micBtn.active {
      background: #d95d5d;
      border-color: #d95d5d;
      animation: micPulse 1s ease-in-out infinite;
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217, 93, 93, 0.6); }
      50% { box-shadow: 0 0 0 10px rgba(217, 93, 93, 0); }
    }

    #micBtn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <canvas id="threeCanvas"></canvas>
    <div id="status"><span id="dot"></span><span id="statusText">Idle</span></div>
    <div id="name">Genie</div>
    <button id="micBtn" title="Voice input">🎤</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ---------- Streamlit component protocol ---------- */
    function sendToStreamlit(type, extra) {
      window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, extra || {}), "*");
    }
    function setComponentValue(value) {
      sendToStreamlit("streamlit:setComponentValue", { value, dataType: "json" });
    }
    function setFrameHeight() {
      const h = document.getElementById("wrap").offsetHeight;
      sendToStreamlit("streamlit:setFrameHeight", { height: h + 20 });
    }
    sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });

    let lastSpokenNonce = -1;
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "streamlit:render") return;
      const args = data.args || {};
      const replyText = args.reply_text || "";
      const replyNonce = args.reply_nonce || 0;
      const muted = !!args.muted;
      if (replyText && replyNonce !== lastSpokenNonce) {
        lastSpokenNonce = replyNonce;
        if (!muted) speak(replyText);
      }
    });

    /* ---------- Three.js avatar ---------- */
    let renderer, scene, camera, avatar, mouth;
    let speaking = false, mouthPhase = 0, idleT = 0;
    let animationStarted = false;
    let smokeSpheres = [];

    /* Refs for animated parts */
    let starMesh = null;
    let chestMesh = null;
    let eyeWLMesh = null, eyeWRMesh = null;
    let pupilLMesh = null, pupilRMesh = null;
    let shineLMesh = null, shineRMesh = null;
    let sparkles = [];
    let nextBlinkTime = 3;
    let lastBoundaryTime = 0;  /* timestamp of last onboundary event */
    let speakingStartTime = 0; /* when speaking started */

    /* Lip sync settings & state */
    let targetMouthScaleY = 0.15;
    let targetMouthScaleX = 1.0;
    let currentMouthScaleY = 0.15;
    let currentMouthScaleX = 1.0;
    let lipSyncTimeoutIds = [];

    const mouthShapes = {
      'a': { y: 1.5, x: 1.2 },
      'e': { y: 1.2, x: 1.3 },
      'i': { y: 1.0, x: 1.3 },
      'o': { y: 1.6, x: 0.7 },
      'u': { y: 1.4, x: 0.6 },
      'p': { y: 0.15, x: 1.0 },
      'b': { y: 0.15, x: 1.0 },
      'm': { y: 0.15, x: 1.0 },
      'f': { y: 0.3, x: 1.1 },
      'v': { y: 0.3, x: 1.1 },
      't': { y: 0.6, x: 1.0 },
      'd': { y: 0.6, x: 1.0 },
      's': { y: 0.4, x: 1.1 },
      'sh': { y: 0.6, x: 0.8 },
      'default': { y: 0.8, x: 1.0 }
    };

    function clearLipSyncTimeouts() {
      lipSyncTimeoutIds.forEach(id => clearTimeout(id));
      lipSyncTimeoutIds = [];
    }

    function animateWord(word) {
      clearLipSyncTimeouts();
      let delay = 0;
      const charTime = 75;

      for (let i = 0; i < word.length; i++) {
        const char = word[i];
        const nextChar = word[i + 1] || '';
        let shape = mouthShapes[char] || mouthShapes['default'];

        if ((char === 's' && nextChar === 'h') || (char === 'c' && nextChar === 'h')) {
          shape = mouthShapes['sh'];
          i++;
        }

        const timeoutId = setTimeout(() => {
          targetMouthScaleY = shape.y;
          targetMouthScaleX = shape.x;
        }, delay);
        lipSyncTimeoutIds.push(timeoutId);
        delay += charTime;
      }

      const endTimeoutId = setTimeout(() => {
        targetMouthScaleY = 0.15;
        targetMouthScaleX = 1.0;
      }, delay);
      lipSyncTimeoutIds.push(endTimeoutId);
    }

    /* ---------- Helper: Create a 5-pointed star shape ---------- */
    function createStarShape(outerR, innerR, points) {
      const shape = new THREE.Shape();
      for (let i = 0; i < points * 2; i++) {
        const angle = (i * Math.PI) / points - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }
      shape.closePath();
      return shape;
    }

    /* ---------- Helper: Create hexagon ring ---------- */
    function createHexRing(radius, tubeRadius, color, emissiveIntensity) {
      const points = [];
      for (let i = 0; i <= 6; i++) {
        const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
        points.push(new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius, 0));
      }
      const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0);
      const geo = new THREE.TubeGeometry(curve, 64, tubeRadius, 8, false);
      const mat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: emissiveIntensity,
        metalness: 0.3,
        roughness: 0.4,
        transparent: true,
        opacity: 0.7
      });
      return new THREE.Mesh(geo, mat);
    }

    function initThree() {
      const wrap = document.getElementById("wrap");
      const canvas = document.getElementById("threeCanvas");
      const W = wrap.clientWidth || window.innerWidth || 400;
      const H = wrap.clientHeight || 450;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(35, W / H, 0.1, 100);
      camera.position.set(0, -1.2, 14.5);
      camera.lookAt(0, -1.2, 0);

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(window.devicePixelRatio || 1);

      /* Lights */
      scene.add(new THREE.AmbientLight(0x606070, 1.0));
      const key = new THREE.DirectionalLight(0xffffff, 1.6);
      key.position.set(3, 5, 6);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0x5da9e0, 0.6);
      fill.position.set(-4, -1, 3);
      scene.add(fill);
      const rim = new THREE.DirectionalLight(0xffd700, 0.4);
      rim.position.set(0, 3, -5);
      scene.add(rim);

      /* ===== Background Hexagons ===== */
      const hex1 = createHexRing(5.5, 0.06, 0x5da9e0, 1.2);
      hex1.position.set(0, -1.0, -3);
      scene.add(hex1);

      const hex2 = createHexRing(5.0, 0.05, 0xffd700, 0.8);
      hex2.position.set(0, -1.0, -2.8);
      hex2.rotation.z = Math.PI / 6;
      scene.add(hex2);

      /* Avatar group */
      avatar = new THREE.Group();
      scene.add(avatar);

      /* ===== Materials ===== */
      const skin = new THREE.MeshStandardMaterial({ color: 0x3d8fd4, roughness: 0.45, metalness: 0.05 });
      const skinDark = new THREE.MeshStandardMaterial({ color: 0x2d7bc0, roughness: 0.5, metalness: 0.05 });
      const goldMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.3, metalness: 0.9, roughness: 0.1 });
      const hairMat = new THREE.MeshStandardMaterial({ color: 0x0a0e1a, roughness: 0.8 });

      /* ===== HEAD ===== */
      const head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 64, 64), skin);
      head.scale.set(1, 1.05, 0.95);
      avatar.add(head);

      /* Pointy ears */
      const earGeo = new THREE.ConeGeometry(0.18, 0.65, 24);
      earGeo.translate(0, 0.32, 0);
      const earL = new THREE.Mesh(earGeo, skin);
      earL.position.set(-1.15, 0.0, -0.15);
      earL.rotation.set(0.15, 0.3, -Math.PI / 4);
      avatar.add(earL);
      const earR = new THREE.Mesh(earGeo, skin);
      earR.position.set(1.15, 0.0, -0.15);
      earR.rotation.set(0.15, -0.3, Math.PI / 4);
      avatar.add(earR);

      /* Gold hoop earrings */
      const earringGeo = new THREE.TorusGeometry(0.16, 0.035, 8, 24);
      const earringL = new THREE.Mesh(earringGeo, goldMat);
      earringL.position.set(-1.28, -0.25, -0.05);
      avatar.add(earringL);
      const earringR = new THREE.Mesh(earringGeo, goldMat);
      earringR.position.set(1.28, -0.25, -0.05);
      avatar.add(earringR);

      /* Eyes */
      const eyeWhiteGeo = new THREE.SphereGeometry(0.22, 24, 24);
      const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.3 });
      eyeWLMesh = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
      eyeWLMesh.position.set(-0.42, 0.25, 1.02);
      eyeWLMesh.scale.set(1, 0.8, 0.5);
      avatar.add(eyeWLMesh);
      eyeWRMesh = eyeWLMesh.clone();
      eyeWRMesh.position.x = 0.42;
      avatar.add(eyeWRMesh);

      const pupilGeo = new THREE.SphereGeometry(0.11, 16, 16);
      const pupilMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
      pupilLMesh = new THREE.Mesh(pupilGeo, pupilMat);
      pupilLMesh.position.set(-0.42, 0.25, 1.14);
      avatar.add(pupilLMesh);
      pupilRMesh = pupilLMesh.clone();
      pupilRMesh.position.x = 0.42;
      avatar.add(pupilRMesh);

      /* Eye shine */
      const shineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 });
      const shineGeo = new THREE.SphereGeometry(0.04, 8, 8);
      shineLMesh = new THREE.Mesh(shineGeo, shineMat);
      shineLMesh.position.set(-0.35, 0.32, 1.16);
      avatar.add(shineLMesh);
      shineRMesh = shineLMesh.clone();
      shineRMesh.position.x = 0.49;
      avatar.add(shineRMesh);

      /* Eyebrows - thick arched */
      const browMat = new THREE.MeshStandardMaterial({ color: 0x0a0e1a });
      const browGeo = new THREE.BoxGeometry(0.42, 0.08, 0.12);
      [-0.42, 0.42].forEach((x, i) => {
        const brow = new THREE.Mesh(browGeo, browMat);
        brow.position.set(x, 0.58, 1.06);
        brow.rotation.z = i === 0 ? 0.12 : -0.12;
        avatar.add(brow);
      });

      /* Nose */
      const nose = new THREE.Mesh(new THREE.SphereGeometry(0.11, 12, 12), skinDark);
      nose.position.set(0, -0.05, 1.15);
      avatar.add(nose);

      /* Mouth group — pushed forward to sit on face surface */
      const mouthGroup = new THREE.Group();
      mouthGroup.position.set(0, -0.48, 1.15);
      avatar.add(mouthGroup);

      /* Inner mouth cavity (dark hole visible when mouth opens) */
      const cavityMat = new THREE.MeshStandardMaterial({ color: 0x1a0505, roughness: 0.9 });
      const cavity = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), cavityMat);
      cavity.scale.set(0.9, 0.6, 0.2);
      cavity.position.set(0, 0, -0.02);
      mouthGroup.add(cavity);

      /* Mouth (lips) */
      const mouthMat = new THREE.MeshStandardMaterial({ color: 0x8b2020, roughness: 0.45 });
      mouth = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), mouthMat);
      mouth.scale.set(1.0, 0.08, 0.3);
      mouthGroup.add(mouth);

      /* ===== FACIAL HAIR ===== */
      /* Mustache - thin curved bars sitting on the upper lip */
      const stacheGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.32, 8);
      const stacheL = new THREE.Mesh(stacheGeo, hairMat);
      stacheL.position.set(-0.18, -0.42, 1.08);
      stacheL.rotation.set(0, 0, -0.4);
      avatar.add(stacheL);
      const stacheR = new THREE.Mesh(stacheGeo, hairMat);
      stacheR.position.set(0.18, -0.42, 1.08);
      stacheR.rotation.set(0, 0, 0.4);
      avatar.add(stacheR);
      /* Mustache curl tips */
      const curlGeo = new THREE.SphereGeometry(0.04, 8, 8);
      const curlL = new THREE.Mesh(curlGeo, hairMat);
      curlL.position.set(-0.3, -0.36, 1.08);
      avatar.add(curlL);
      const curlR = new THREE.Mesh(curlGeo, hairMat);
      curlR.position.set(0.3, -0.36, 1.08);
      avatar.add(curlR);

      /* Beard - trimmed, hugs the jaw */
      const beardGeo = new THREE.SphereGeometry(0.5, 32, 32);
      const beard = new THREE.Mesh(beardGeo, hairMat);
      beard.scale.set(0.85, 0.7, 0.45);
      beard.position.set(0, -0.85, 0.6);
      avatar.add(beard);

      /* Goatee point */
      const goatee = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.35, 16), hairMat);
      goatee.rotation.x = Math.PI;
      goatee.position.set(0, -1.25, 0.6);
      avatar.add(goatee);

      /* ===== TOPKNOT & STAR ===== */
      const topknotSizes = [0.35, 0.28, 0.22, 0.16];
      const topknotYPositions = [1.35, 1.6, 1.82, 2.0];
      topknotSizes.forEach((r, i) => {
        const knot = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 16), hairMat);
        knot.position.set(0, topknotYPositions[i], -0.1 + i * 0.05);
        avatar.add(knot);
      });

      /* 3D Gold Star on top */
      const starShape = createStarShape(0.35, 0.15, 5);
      const starExtrudeSettings = { depth: 0.12, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.02, bevelSegments: 2 };
      const starGeo = new THREE.ExtrudeGeometry(starShape, starExtrudeSettings);
      starGeo.center();
      starMesh = new THREE.Mesh(starGeo, goldMat);
      starMesh.position.set(0, 2.35, -0.05);
      avatar.add(starMesh);

      /* ===== NECK ===== */
      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 0.5, 16), skin);
      neck.position.set(0, -1.5, 0);
      avatar.add(neck);

      /* ===== MUSCULAR CHEST ===== */
      chestMesh = new THREE.Mesh(new THREE.SphereGeometry(1.3, 32, 32), skin);
      chestMesh.scale.set(1.35, 1.0, 0.85);
      chestMesh.position.set(0, -2.5, 0);
      avatar.add(chestMesh);

      /* Pec muscles */
      const pecGeo = new THREE.SphereGeometry(0.45, 24, 24);
      const pecL = new THREE.Mesh(pecGeo, skin);
      pecL.position.set(-0.5, -2.15, 0.75);
      pecL.scale.set(1.1, 0.8, 0.6);
      avatar.add(pecL);
      const pecR = pecL.clone();
      pecR.position.x = 0.5;
      avatar.add(pecR);

      /* Abs / lower torso */
      const abs = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.55, 1.0, 16), skin);
      abs.position.set(0, -3.3, 0.1);
      avatar.add(abs);

      /* ===== GOLD CHAIN NECKLACE ===== */
      const chainGeo = new THREE.TorusGeometry(0.65, 0.03, 8, 32);
      const chain = new THREE.Mesh(chainGeo, goldMat);
      chain.position.set(0, -1.85, 0.5);
      chain.rotation.x = Math.PI / 2.3;
      avatar.add(chain);

      /* Gold medallion disk */
      const medallionGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.06, 32);
      const medallion = new THREE.Mesh(medallionGeo, goldMat);
      medallion.rotation.x = Math.PI / 2;
      medallion.position.set(0, -2.55, 0.95);
      avatar.add(medallion);

      /* Medallion mini star */
      const miniStarShape = createStarShape(0.15, 0.06, 5);
      const miniStarGeo = new THREE.ExtrudeGeometry(miniStarShape, { depth: 0.04, bevelEnabled: false });
      miniStarGeo.center();
      const miniStarMat = new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.8, roughness: 0.2 });
      const miniStar = new THREE.Mesh(miniStarGeo, miniStarMat);
      miniStar.position.set(0, -2.35, 1.0);
      avatar.add(miniStar);

      /* ===== ARMS ===== */
      /* Upper arms */
      const armGeo = new THREE.CylinderGeometry(0.3, 0.25, 1.6, 16);
      const armL = new THREE.Mesh(armGeo, skin);
      armL.position.set(-2.0, -2.3, 0.1);
      armL.rotation.z = Math.PI / 3.5;
      avatar.add(armL);
      const armR = new THREE.Mesh(armGeo, skin);
      armR.position.set(2.0, -2.3, 0.1);
      armR.rotation.z = -Math.PI / 3.5;
      avatar.add(armR);

      /* Forearms */
      const forearmGeo = new THREE.CylinderGeometry(0.22, 0.2, 1.4, 16);
      const forearmL = new THREE.Mesh(forearmGeo, skin);
      forearmL.position.set(-3.1, -2.7, 0.2);
      forearmL.rotation.z = Math.PI / 6;
      avatar.add(forearmL);
      const forearmR = new THREE.Mesh(forearmGeo, skin);
      forearmR.position.set(3.1, -2.7, 0.2);
      forearmR.rotation.z = -Math.PI / 6;
      avatar.add(forearmR);

      /* Gold wrist cuffs */
      const cuffGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.2, 16);
      const cuffL = new THREE.Mesh(cuffGeo, goldMat);
      cuffL.position.set(-2.55, -2.5, 0.15);
      cuffL.rotation.z = Math.PI / 3.5;
      avatar.add(cuffL);
      const cuffR = new THREE.Mesh(cuffGeo, goldMat);
      cuffR.position.set(2.55, -2.5, 0.15);
      cuffR.rotation.z = -Math.PI / 3.5;
      avatar.add(cuffR);

      /* Hands (open, palm-up spheres) */
      const handGeo = new THREE.SphereGeometry(0.22, 16, 16);
      const handL = new THREE.Mesh(handGeo, skin);
      handL.position.set(-3.6, -3.1, 0.3);
      handL.scale.set(1.2, 0.7, 1.0);
      avatar.add(handL);
      const handR = handL.clone();
      handR.position.x = 3.6;
      avatar.add(handR);

      /* ===== GOLD BELT & EMERALD GEMS ===== */
      const beltGeo = new THREE.CylinderGeometry(0.72, 0.72, 0.22, 32);
      const belt = new THREE.Mesh(beltGeo, goldMat);
      belt.position.set(0, -3.75, 0.1);
      avatar.add(belt);

      /* Emerald gems along belt */
      const emeraldMat = new THREE.MeshStandardMaterial({
        color: 0x2ecc71, emissive: 0x2ecc71, emissiveIntensity: 0.5,
        metalness: 0.4, roughness: 0.2
      });
      const emeraldGeo = new THREE.SphereGeometry(0.07, 12, 12);
      for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI - Math.PI / 2;
        const ex = Math.sin(angle) * 0.72;
        const ez = Math.cos(angle) * 0.72;
        const gem = new THREE.Mesh(emeraldGeo, emeraldMat);
        gem.position.set(ex, -3.75, ez + 0.1);
        avatar.add(gem);
      }

      /* ===== SWIRLING SMOKE TAIL ===== */
      smokeSpheres = [];
      const smokeBaseY = -4.1;
      const smokeData = [
        { y: 0, r: 0.65, opacity: 0.35 },
        { y: -0.55, r: 0.55, opacity: 0.30 },
        { y: -1.05, r: 0.50, opacity: 0.25 },
        { y: -1.5, r: 0.42, opacity: 0.22 },
        { y: -1.9, r: 0.35, opacity: 0.18 },
        { y: -2.3, r: 0.30, opacity: 0.15 },
        { y: -2.65, r: 0.25, opacity: 0.12 },
      ];
      smokeData.forEach((s, i) => {
        const smokeMat = new THREE.MeshStandardMaterial({
          color: 0x6db8e8, emissive: 0x3a8fd4, emissiveIntensity: 0.3,
          transparent: true, opacity: s.opacity, roughness: 0.9
        });
        const smokeSphere = new THREE.Mesh(new THREE.SphereGeometry(s.r, 24, 24), smokeMat);
        smokeSphere.position.set(0, smokeBaseY + s.y, 0);
        smokeSphere.userData = { baseY: smokeBaseY + s.y, index: i, baseR: s.r };
        avatar.add(smokeSphere);
        smokeSpheres.push(smokeSphere);
      });

      /* ===== RUPEE SYMBOL (₹) AT BASE ===== */
      const rupeeGroup = new THREE.Group();
      rupeeGroup.position.set(0, -7.4, 0.3);
      avatar.add(rupeeGroup);

      const rupeeMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.2, metalness: 0.85, roughness: 0.15 });

      /* Top horizontal bar */
      const topBar = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.07, 0.06), rupeeMat);
      topBar.position.set(0, 0.35, 0);
      rupeeGroup.add(topBar);

      /* Second horizontal bar */
      const midBar = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.07, 0.06), rupeeMat);
      midBar.position.set(0, 0.2, 0);
      rupeeGroup.add(midBar);

      /* Vertical stem */
      const stem = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.6, 0.06), rupeeMat);
      stem.position.set(-0.15, 0.1, 0);
      rupeeGroup.add(stem);

      /* Diagonal stroke */
      const diag = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.55, 0.06), rupeeMat);
      diag.position.set(0.08, -0.08, 0);
      diag.rotation.z = Math.PI / 5;
      rupeeGroup.add(diag);

      /* Curved top (arc of the ₹) */
      const arcGeo = new THREE.TorusGeometry(0.18, 0.04, 8, 16, Math.PI);
      const arc = new THREE.Mesh(arcGeo, rupeeMat);
      arc.position.set(0.08, 0.35, 0);
      arc.rotation.z = Math.PI / 2;
      rupeeGroup.add(arc);

      /* Growth arrow pointing up-right */
      const arrowStem = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.45, 0.06), rupeeMat);
      arrowStem.position.set(0.5, 0.2, 0);
      arrowStem.rotation.z = -Math.PI / 4;
      rupeeGroup.add(arrowStem);

      const arrowHeadGeo = new THREE.ConeGeometry(0.1, 0.2, 8);
      const arrowHead = new THREE.Mesh(arrowHeadGeo, rupeeMat);
      arrowHead.position.set(0.65, 0.38, 0);
      arrowHead.rotation.z = -Math.PI / 4;
      rupeeGroup.add(arrowHead);

      /* ===== FLOATING SPARKLE PARTICLES ===== */
      sparkles = [];
      const sparkleMat = new THREE.MeshStandardMaterial({
        color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 1.0,
        transparent: true, opacity: 0.7
      });
      const sparkleGeo = new THREE.SphereGeometry(0.04, 8, 8);
      for (let i = 0; i < 20; i++) {
        const sp = new THREE.Mesh(sparkleGeo, sparkleMat.clone());
        sp.position.set(
          (Math.random() - 0.5) * 8,
          (Math.random() - 0.5) * 10 - 2,
          (Math.random() - 0.5) * 3
        );
        sp.userData = {
          speedX: (Math.random() - 0.5) * 0.02,
          speedY: 0.005 + Math.random() * 0.015,
          phase: Math.random() * Math.PI * 2,
          baseOpacity: 0.3 + Math.random() * 0.5
        };
        scene.add(sp);
        sparkles.push(sp);
      }

      /* Start animation loop */
      if (!animationStarted) {
        animationStarted = true;
        animate();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      idleT += 0.01;
      if (!avatar) return;

      /* Gentle idle sway */
      avatar.rotation.y = Math.sin(idleT * 0.6) * 0.1;
      avatar.position.y = Math.sin(idleT * 1.2) * 0.06;

      /* Star rotation */
      if (starMesh) {
        starMesh.rotation.z += 0.008;
        starMesh.rotation.y = Math.sin(idleT * 2) * 0.15;
      }

      /* Chest breathing */
      if (chestMesh) {
        const breath = 1 + Math.sin(idleT * 1.5) * 0.02;
        chestMesh.scale.set(1.35 * breath, 1.0, 0.85 * breath);
      }

      /* Eye blinking */
      if (eyeWLMesh) {
        const time = idleT;
        if (time > nextBlinkTime) {
          nextBlinkTime = time + 2.5 + Math.random() * 4;
        }
        const blinkDist = time - (nextBlinkTime - 0.12);
        let blinkScale = 1.0;
        if (blinkDist >= 0 && blinkDist < 0.12) {
          blinkScale = blinkDist < 0.06
            ? 1.0 - (blinkDist / 0.06) * 0.95
            : 0.05 + ((blinkDist - 0.06) / 0.06) * 0.95;
        }
        eyeWLMesh.scale.y = 0.8 * blinkScale;
        eyeWRMesh.scale.y = 0.8 * blinkScale;
        pupilLMesh.scale.y = blinkScale;
        pupilRMesh.scale.y = blinkScale;
        shineLMesh.scale.y = blinkScale;
        shineRMesh.scale.y = blinkScale;
      }

      /* Smoke tail animation */
      smokeSpheres.forEach((s) => {
        const i = s.userData.index;
        const phase = idleT * 2 + i * 0.9;
        s.position.x = Math.sin(phase) * (0.15 + i * 0.08);
        s.position.z = Math.cos(phase * 0.7) * (0.1 + i * 0.04);
        const pulse = 1 + Math.sin(idleT * 3 + i) * 0.08;
        s.scale.set(pulse, pulse, pulse);
      });

      /* Floating sparkle particles */
      sparkles.forEach((sp) => {
        const ud = sp.userData;
        sp.position.y += ud.speedY;
        sp.position.x += Math.sin(idleT * 2 + ud.phase) * 0.003;
        sp.material.opacity = ud.baseOpacity * (0.5 + 0.5 * Math.sin(idleT * 4 + ud.phase));
        if (sp.position.y > 5) {
          sp.position.y = -8;
          sp.position.x = (Math.random() - 0.5) * 8;
        }
      });

      /* Lip sync animation */
      if (speaking) {
        const now = performance.now();
        const boundaryWorking = (now - lastBoundaryTime) < 500;

        if (boundaryWorking) {
          /* Phonetic-driven lip sync */
          currentMouthScaleY += (targetMouthScaleY - currentMouthScaleY) * 0.25;
          currentMouthScaleX += (targetMouthScaleX - currentMouthScaleX) * 0.25;
        } else {
          /* Fallback: sine-wave animation when onboundary is unavailable */
          mouthPhase += 0.18;
          const wave = 0.3 + Math.abs(Math.sin(mouthPhase * 2.5)) * 1.2 + Math.sin(mouthPhase * 1.3) * 0.3;
          currentMouthScaleY += (wave - currentMouthScaleY) * 0.3;
          currentMouthScaleX += ((0.7 + Math.sin(mouthPhase * 1.8) * 0.3) - currentMouthScaleX) * 0.3;
        }
        mouth.scale.y = currentMouthScaleY * 0.4;
        mouth.scale.x = currentMouthScaleX * 1.0;
        mouth.scale.z = 0.3 + currentMouthScaleY * 0.15;
        mouth.position.y = -currentMouthScaleY * 0.025;
      } else {
        mouthPhase = 0;
        currentMouthScaleY += (0.15 - currentMouthScaleY) * 0.2;
        currentMouthScaleX += (1.0 - currentMouthScaleX) * 0.2;
        mouth.scale.y = currentMouthScaleY * 0.4;
        mouth.scale.x = currentMouthScaleX * 1.0;
        mouth.scale.z = 0.3;
        mouth.position.y = -currentMouthScaleY * 0.025;
      }
      renderer.render(scene, camera);
    }

    function handleResize() {
      if (!renderer || !camera) return;
      const wrap = document.getElementById("wrap");
      const W = wrap.clientWidth || window.innerWidth || 400;
      const H = wrap.clientHeight || 450;
      camera.aspect = W / H;
      camera.updateProjectionMatrix();
      renderer.setSize(W, H);
    }

    /* Initialise after the DOM + Three.js are ready */
    function tryInit() {
      if (typeof THREE === "undefined") { setTimeout(tryInit, 100); return; }
      const wrap = document.getElementById("wrap");
      if (!wrap || wrap.clientWidth === 0) { setTimeout(tryInit, 80); return; }
      initThree();
      setFrameHeight();
    }

    window.addEventListener("load", tryInit);
    window.addEventListener("resize", () => { handleResize(); setFrameHeight(); });
    /* Also try immediately in case load already fired */
    if (document.readyState === "complete") tryInit();

    /* ---------- Status pill ---------- */
    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    function setStatus(mode, label) {
      statusEl.className = mode;
      statusText.textContent = label;
    }

    /* ---------- TTS ---------- */
    let bestVoice = null;
    let voicesLoaded = false;

    function pickBestVoice() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return null;
      /* Priority: Google UK English > Google US English > any 'en' Google voice > first en voice */
      const prefs = [
        v => v.name.includes('Google UK English Male'),
        v => v.name.includes('Google UK English Female'),
        v => v.name.includes('Google US English'),
        v => v.name.includes('Google') && v.lang.startsWith('en'),
        v => v.name.includes('Microsoft') && v.lang.startsWith('en') && v.name.includes('Online'),
        v => v.lang.startsWith('en'),
      ];
      for (const test of prefs) {
        const found = voices.find(test);
        if (found) return found;
      }
      return voices[0];
    }

    /* Voices load async in Chrome — listen for the event */
    if ('speechSynthesis' in window) {
      const loadVoices = () => { bestVoice = pickBestVoice(); voicesLoaded = true; };
      window.speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices();
    }

    /* Chrome silently stops long utterances after ~15s. This keepalive pings
       the synth engine every 10s while speech is active to prevent that. */
    let ttsKeepAliveId = null;
    function startTTSKeepAlive() {
      stopTTSKeepAlive();
      ttsKeepAliveId = setInterval(() => {
        if (window.speechSynthesis.speaking) {
          window.speechSynthesis.pause();
          window.speechSynthesis.resume();
        }
      }, 10000);
    }
    function stopTTSKeepAlive() {
      if (ttsKeepAliveId) { clearInterval(ttsKeepAliveId); ttsKeepAliveId = null; }
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      stopTTSKeepAlive();
      clearLipSyncTimeouts();
      targetMouthScaleY = 0.15;
      targetMouthScaleX = 1.0;

      const utter = new SpeechSynthesisUtterance(text);
      window.currentUtterance = utter; // prevent GC bug

      /* Apply best voice with tuned rate/pitch */
      if (bestVoice) utter.voice = bestVoice;
      utter.rate = 1.0;
      utter.pitch = 0.95;

      utter.onstart = () => {
        speaking = true;
        speakingStartTime = performance.now();
        lastBoundaryTime = 0;
        mouthPhase = 0;
        setStatus('speaking', 'Speaking');
        startTTSKeepAlive();
      };
      utter.onend = () => {
        speaking = false;
        setStatus('', 'Idle');
        stopTTSKeepAlive();
        clearLipSyncTimeouts();
        targetMouthScaleY = 0.15;
        targetMouthScaleX = 1.0;
      };
      utter.onerror = () => {
        speaking = false;
        setStatus('', 'Idle');
        stopTTSKeepAlive();
        clearLipSyncTimeouts();
        targetMouthScaleY = 0.15;
        targetMouthScaleX = 1.0;
      };

      utter.onboundary = (event) => {
        if (event.name === 'word') {
          lastBoundaryTime = performance.now();
          const word = text.substring(event.charIndex).split(/[\s,.;!?]+/)[0].toLowerCase();
          animateWord(word);
        }
      };

      window.speechSynthesis.speak(utter);
    }

    /* ---------- STT ---------- */
    const micBtn = document.getElementById("micBtn");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null, listening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;  /* Show live transcription */
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        listening = true;
        micBtn.classList.add('active');
        setStatus('listening', 'Listening…');
      };
      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove('active');
        if (!speaking) setStatus('', 'Idle');
      };
      recognition.onerror = (e) => {
        listening = false;
        micBtn.classList.remove('active');
        if (e.error === 'not-allowed') {
          setStatus('', 'Mic blocked');
        } else {
          setStatus('', 'Idle');
        }
      };
      recognition.onresult = (e) => {
        let finalTranscript = '';
        let interimTranscript = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            finalTranscript += t;
          } else {
            interimTranscript += t;
          }
        }
        if (interimTranscript) {
          setStatus('listening', interimTranscript.substring(0, 40) + (interimTranscript.length > 40 ? '…' : ''));
        }
        if (finalTranscript) {
          setStatus('thinking', 'Thinking…');
          setComponentValue({ transcript: finalTranscript.trim(), nonce: Date.now() });
        }
      };

      micBtn.addEventListener('click', () => {
        if (listening) { recognition.stop(); return; }
        window.speechSynthesis.cancel();
        stopTTSKeepAlive();
        clearLipSyncTimeouts();
        speaking = false;
        targetMouthScaleY = 0.15;
        targetMouthScaleX = 1.0;
        recognition.start();
      });
    } else {
      micBtn.disabled = true;
      micBtn.title = 'Voice input not supported — try Chrome';
    }
  </script>
</body>

</html>
